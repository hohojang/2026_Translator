<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Google 번역기 - 웹 버전</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4285F4 0%, #34A853 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .translator {
            padding: 30px 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            resize: vertical;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #4285F4;
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 140px;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-ko-en {
            background: linear-gradient(135deg, #4285F4 0%, #5C9CFA 100%);
            color: white;
        }

        .btn-en-ko {
            background: linear-gradient(135deg, #34A853 0%, #4CAF50 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .output-group {
            margin-top: 20px;
        }

        .output-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        .output {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            background: #f8f9fa;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 14px;
        }

        .footer a {
            color: #4285F4;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2em;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                min-width: auto;
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 Google 번역기</h1>
            <p>한국어 ↔ 영어 자동 번역</p>
        </div>

        <div class="translator">
            <div class="input-group">
                <label for="input-text">원문 입력</label>
                <textarea id="input-text" placeholder="번역할 텍스트를 입력하세요..."></textarea>
            </div>

            <div class="buttons">
                <button class="btn btn-ko-en" onclick="translate('en')">
                    🇰🇷 한국어 → 🇺🇸 영어
                </button>
                <button class="btn btn-en-ko" onclick="translate('ko')">
                    🇺🇸 영어 → 🇰🇷 한국어
                </button>
            </div>

            <div class="output-group">
                <label for="output-text">번역 결과</label>
                <div id="output-text" class="output"></div>
            </div>

            <div id="status" class="status"></div>
        </div>

        <div class="footer">
            <p>© 2026 박 장 호 | <a href="https://github.com/hohojang/2026_Translator" target="_blank">GitHub</a></p>
        </div>
    </div>

    <script>
        async function translate(targetLang) {
            const inputText = document.getElementById('input-text').value.trim();
            const outputDiv = document.getElementById('output-text');
            const statusDiv = document.getElementById('status');

            if (!inputText) {
                showStatus('번역할 텍스트를 입력해주세요.', 'error');
                return;
            }

            // 로딩 상태 표시
            showStatus('번역 중... <div class="loading-spinner"></div>', 'loading');
            outputDiv.textContent = '';

            try {
                const response = await fetch('/translate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: inputText,
                        target_lang: targetLang
                    })
                });

                const data = await response.json();

                if (data.error) {
                    showStatus(data.error, 'error');
                } else {
                    outputDiv.textContent = data.result;
                    showStatus('번역 완료!', 'success');
                }
            } catch (error) {
                showStatus('번역 실패: 인터넷 연결을 확인해주세요.', 'error');
                console.error('Translation error:', error);
            }
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = message;
            statusDiv.className = 'status ' + type;

            // 3초 후 자동 숨김 (성공 메시지만)
            if (type === 'success') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 3000);
            }
        }

        // Enter 키로 번역
        document.getElementById('input-text').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                // Ctrl+Enter로 한국어→영어 번역
                translate('en');
            } else if (e.key === 'Enter' && e.shiftKey) {
                // Shift+Enter로 영어→한국어 번역
                translate('ko');
            }
        });

        // 페이지 로드 시 포커스
        window.addEventListener('load', function() {
            document.getElementById('input-text').focus();
        });
    </script>
</body>
</html>
